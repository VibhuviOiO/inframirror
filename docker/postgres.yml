services:
  postgres:
    image: postgres:latest
    container_name: postgres
    volumes:
        - data-postgresql:/var/lib/postgresql/data/
    environment:
    - POSTGRES_USER=inframirror_user
    - POSTGRES_PASSWORD=inframirror_pass
    - POSTGRES_DB=inframirror
    - POSTGRES_ROOT_PASSWORD=postgres_root_pass
    ports: ['5432:5432']

volumes:
  data-postgresql: